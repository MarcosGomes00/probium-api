<!DOCTYPE html>

<html>

<head>

<title>⚽ PROBIUM AI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{

background:#0f172a;
color:white;
font-family:Arial;
text-align:center;

}

.card{

background:#1e293b;
padding:20px;
margin:20px;
border-radius:10px;

}

</style>

</head>

<body>

<h1>⚽ PROBIUM AI</h1>

<h3>📊 Plataforma de Análise Profissional</h3>


<div class="card">

<h2 id="match">⚽ Carregando...</h2>

<p id="xg"></p>

</div>


<div class="card">

<h3>📈 Probabilidades</h3>

<canvas id="probChart"></canvas>

</div>


<div class="card">

<h3>💰 Scanner Value Bet</h3>

<p id="value"></p>

</div>


<script>

fetch("/data")

.then(res=>res.json())

.then(data=>{

document.getElementById("match").innerText="⚽ "+data.match

document.getElementById("xg").innerText=

"📊 xG Casa 🏠 "+data.expected_goals.home+
" | xG Fora ✈️ "+data.expected_goals.away



const ctx=document.getElementById("probChart")

new Chart(ctx,{

type:"bar",

data:{

labels:["🏠 Casa","🤝 Empate","✈️ Fora"],

datasets:[{

label:"Probabilidades",

data:[

data.probabilities.home_win.prob,

data.probabilities.draw.prob,

data.probabilities.away_win.prob

],

backgroundColor:["#22c55e","#facc15","#ef4444"]

}]

}

})


document.getElementById("value").innerText=

"💰 Casa EV: "+data.value_bet.home_ev+
" | 🤝 Empate EV: "+data.value_bet.draw_ev+
" | ✈️ Fora EV: "+data.value_bet.away_ev

})

</script>

</body>

</html>
